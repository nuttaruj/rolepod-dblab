name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    name: build + typecheck + test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Set up Python (for the db-migrate-verify drift sidecar)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SQLAlchemy (drift sidecar dependency)
        run: python -m pip install --quiet "SQLAlchemy>=2.0"

      - name: Install dependencies
        run: npm ci

      - name: Build (tsup + schema export)
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      # Integration tests spin a throwaway postgres:16-alpine via Docker, which
      # is preinstalled on ubuntu-latest. The drift test uses the Python +
      # SQLAlchemy set up above.
      - name: Test
        run: npm test
